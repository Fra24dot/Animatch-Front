name: CICD Animatch Front

on:
  push:
    branches: [main, develop, "feature/**", "features/**"]
    paths:
      - "Animatch-Front/**"
  pull_request:
    branches: [main, develop]
    paths:
      - "Animatch-Front/**"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
      - name: Install dependencies
        run: npm ci
        working-directory: Animatch-Front
      - name: Build solution
        run: npm run build
        working-directory: Animatch-Front