<app-navbar></app-navbar>

<div class="register-background">
  <!-- Pattes animées -->
  @for (paw of paws; track paw) {
    <div class="paw"
         [style.left.%]="paw.x"
         [style.top.%]="paw.y"
         [style.animation-delay]="paw.delay + 's'"
         [style.transform]="'rotate(' + paw.rotation + 'deg)'">
      🐾
    </div>
  }

  <!-- Box centrale -->
  <div class="register-box">
    <h1>Register</h1>
    <div class="buttons">
      <button class="btn-login" routerLink="/login">Adoptant</button>
      <button class="btn-register" routerLink="/register">Refuge</button>
    </div>
  </div>

</div>
