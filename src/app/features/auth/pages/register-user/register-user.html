<app-navbar></app-navbar>
<app-paw-background></app-paw-background>

<div class="register-box">
  <h1>Register</h1>

  @if (errorMessage()) {
    <p class="error-message">{{ errorMessage() }}</p>
  }

  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    
    <div class="form-slider" [class.step-two]="currentStep() === 2">
      
      <div class="form-step step-1">
        <div class="form-grid">
          <div class="form-group">
            <label>Nom</label>
            <input formControlName="lastName" type="text" />
          </div>
          <div class="form-group">
            <label>Prénom</label>
            <input formControlName="firstName" type="text" />
          </div>
          <div class="form-group">
            <label>Date de naissance</label>
            <input formControlName="birthDate" type="date" />
          </div>
          <div class="form-group">
            <label>Genre</label>
            <select formControlName="gender">
              <option value="">Sélectionner</option>
              <option value="M">Homme</option>
              <option value="F">Femme</option>
            </select>
          </div>
        </div>
        
        <button type="button" class="btn-next" (click)="nextStep()">
          Suivant &rarr;
        </button>
      </div>

      <div class="form-step step-2">
        <div class="form-grid">
          <div class="form-group full-width">
            <label>Email</label>
            <input formControlName="email" type="email" />
          </div>
          <div class="form-group full-width">
            <label>Password</label>
            <input formControlName="password" type="password" />
          </div>
          <div class="form-group full-width">
            <label>Confirmer le mot de passe</label>
            <input formControlName="confirmPassword" type="password" />
          </div>
        </div>

        <div class="step-buttons">
          <button type="button" class="btn-prev" (click)="prevStep()">
            &larr; Retour
          </button>
          <button type="submit" class="btn-register" [disabled]="form.invalid || isLoading()">
            Register
          </button>
        </div>
      </div>

    </div> </form>
</div>
